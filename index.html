<!doctype html>
<html lang="en" style="background-color:#2f2f2f;color:white;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimo</title>
  </head>

  <body style="background-color:#2f2f2f;">
    <div id="splash" style="
      position:fixed;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
      background:#2f2f2f;z-index:9999;
      font-family:system-ui,sans-serif;
    ">
      <style>
        @keyframes splash-pop {
          0%   { transform: scale(0.7); opacity: 0; }
          60%  { transform: scale(1.08); opacity: 1; }
          100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes splash-glow {
          0%, 100% { box-shadow: 0 0 0px 0px rgba(99,102,241,0); }
          50%       { box-shadow: 0 0 32px 8px rgba(99,102,241,0.35); }
        }
        @keyframes splash-dot {
          0%, 80%, 100% { transform: scale(0.5); opacity: 0.25; }
          40%            { transform: scale(1);   opacity: 1; }
        }
        @keyframes splash-fade-in {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        #splash-logo {
          animation: splash-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both,
                     splash-glow 2s ease-in-out 0.5s infinite;
          border-radius: 18px;
        }
        #splash-title {
          animation: splash-fade-in 0.4s ease 0.35s both;
        }
        #splash-dots {
          animation: splash-fade-in 0.4s ease 0.5s both;
        }
        .splash-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#6366f1; margin:0 4px; }
        .splash-dot:nth-child(1) { animation: splash-dot 1.2s ease-in-out 0.0s infinite; }
        .splash-dot:nth-child(2) { animation: splash-dot 1.2s ease-in-out 0.2s infinite; }
        .splash-dot:nth-child(3) { animation: splash-dot 1.2s ease-in-out 0.4s infinite; }
      </style>

      <svg id="splash-logo" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="18" fill="#6366f1"/>
        <text x="32" y="44" text-anchor="middle" font-size="34" font-weight="700" fill="white" font-family="system-ui,sans-serif">T</text>
      </svg>

      <div id="splash-title" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
        <span style="color:white;font-size:18px;font-weight:700;letter-spacing:-0.02em;">Trimo</span>
        <span style="color:#6b6b80;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;">App time tracker</span>
      </div>

      <div id="splash-dots">
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
        <span class="splash-dot"></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
