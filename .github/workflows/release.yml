name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Trimo ${{ github.ref_name }}
          releaseBody: |
            Download the installer below and run it. No configuration required.

            **Requirements:** Windows 10 or later (64-bit)
          releaseDraft: false
          prerelease: false

      - name: Trigger landing page rebuild
        if: success()
        run: |
          curl -s -X POST `
            -H "Authorization: Bearer ${{ secrets.TRIMO_WEB_PAT }}" `
            -H "Accept: application/vnd.github+json" `
            -H "Content-Type: application/json" `
            https://api.github.com/repos/bhd71/trimo-web/dispatches `
            -d "{\"event_type\":\"new-release\"}"
