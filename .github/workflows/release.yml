name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-frontend:
    name: Frontend tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  test-rust:
    name: Rust tests (cargo test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run cargo test
        working-directory: src-tauri
        run: cargo test

  release:
    name: Build and release
    needs: [test-frontend, test-rust]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-all-crates: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty("${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}")) {
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY is NOT set — .sig files and latest.json will not be generated"
          } else {
            $key = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set (length: $($key.Length) chars)"
          }
          if ([string]::IsNullOrEmpty("${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}")) {
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is NOT set"
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set"
          }

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Trimo ${{ github.ref_name }}
          releaseBody: |
            Download the installer below and run it. No configuration required.

            **Requirements:** Windows 10 or later (64-bit)
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: List build artifacts
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== Bundle output ==="
          $bundleDir = "src-tauri\target\release\bundle"
          if (Test-Path $bundleDir) {
            Get-ChildItem -Recurse $bundleDir | Select-Object FullName, Length | Format-Table -AutoSize
          } else {
            Write-Host "Bundle directory not found: $bundleDir"
          }

      - name: Trigger landing page rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.TRIMO_WEB_PAT }}
        run: gh api repos/bhd71/trimo-web/dispatches -X POST -f event_type=new-release
