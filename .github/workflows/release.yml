name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Trimo ${{ github.ref_name }}
          releaseBody: |
            Download the installer below and run it. No configuration required.

            **Requirements:** Windows 10 or later (64-bit)
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Trigger landing page rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.TRIMO_WEB_PAT }}
        run: gh api repos/bhd71/trimo-web/dispatches -X POST -f event_type=new-release
